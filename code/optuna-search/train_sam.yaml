# LLaMA-Factory Training Configuration for SAM Module
# =====================================================
# Final Config (Optuna Best Trial)

### Model Configuration
model_name_or_path: ../../models/Phi-4-mini-instruct
template: phi4

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### Dataset
dataset: sam_train
eval_dataset: sam_dev
dataset_dir: dataset
cutoff_len: 1024

### LoRA Hyperparameters (OPTUNA RESULT)
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05

### Training Hyperparameters (OPTUNA RESULT)
learning_rate: 7.789561020552416e-05
num_train_epochs: 3
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
per_device_eval_batch_size: 2

### Optimizer
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0

### Evaluation & Saving
eval_strategy: steps
eval_steps: 100
save_strategy: steps
save_steps: 100
metric_for_best_model: eval_loss
greater_is_better: false
load_best_model_at_end: true

### Output
output_dir: outputs/sam_model
logging_steps: 5
logging_first_step: true

### Precision & Advanced
bf16: true
gradient_checkpointing: true
report_to: none